<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Collection</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="space-x-3">

<button class="bg-blue-500 hover:bg-blue-700 text-white px-5 py-2 rounded">
Primary
</button>

<button class="bg-gray-500 hover:bg-gray-700 text-white px-5 py-2 rounded">
Secondary
</button>

<button class="bg-green-500 hover:bg-green-700 text-white px-5 py-2 rounded">
Success
</button>

<button class="bg-red-500 hover:bg-red-700 text-white px-5 py-2 rounded">
Danger
</button>

<button class="border-2 border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white px-5 py-2 rounded">
Outline
</button>

</div>

</body>
</html>
